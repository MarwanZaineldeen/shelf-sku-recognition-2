services:
  nginx:
    image: ${DOCKERHUB_USERNAME:-mazen1393}/retail-ai-nginx:${IMAGE_TAG:-latest}
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: retail-ai-nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - retail-ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    image: ${DOCKERHUB_USERNAME:-mazen1393}/retail-ai-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retail-ai-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      - RETAIL_AI_ROOT=/app
      - HOST=0.0.0.0
      - PORT=5000
      - REGISTRY_DB_PATH=/app/data/processed/crops/gt_clean/retail_sku_registry_dinov3.db
      - ONBOARDING_DB_PATH=/app/data/processed/crops/gt_clean/retail_sku_registry_onboarding.db
      - REVIEWS_DB_PATH=/app/data/processed/active_learning/reviews.db
      - YOLO_WEIGHTS_PATH=/app/runs/detect/yolo8l_sku110k/yolov8l-sku110k.pt
      - SKU_MAPPING_PATH=/app/configs/sku_mapping_v2.json
      - SKU_PREVIEW_DIR=/app/data/processed/Sku Preview
      - HF_HOME=/app/.cache/huggingface
      - TORCH_HOME=/app/.cache/torch
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./runs:/app/runs
      - ./.cache:/app/.cache
    networks:
      - retail-ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - retail-ai-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - retail-ai-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  retail-ai-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
